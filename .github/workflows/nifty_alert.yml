name: 📈 Nifty Alert Bot

on:
  # ── Scheduled runs (IST = UTC + 5:30) ──────────────────────────────
  schedule:
    # After market close: 3:45 PM IST = 10:15 UTC (Mon–Fri)
    - cron: "15 10 * * 1-5"
    # Before market open: 9:00 AM IST = 3:30 UTC (Mon–Fri)  [optional]
    - cron: "30 3 * * 1-5"

  # ── Manual trigger (useful for testing) ─────────────────────────────
  workflow_dispatch:
    inputs:
      force_send_summary:
        description: "Send summary even if no alerts"
        required: false
        default: "true"

# ─────────────────────────────────────────────────────────────────────
jobs:
  nifty-alert:
    name: Run Nifty Alert Bot
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Python setup with pip cache
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run the bot
      - name: Run Nifty Alert Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
        run: python nifty_alert.py

      # 5. Upload logs as artifact (useful for debugging)
      - name: Save run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nifty-alert-log-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
          if-no-files-found: ignore
