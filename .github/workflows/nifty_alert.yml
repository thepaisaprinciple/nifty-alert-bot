name: 📈 Nifty Alert Bot

on:
  schedule:
    # GitHub cron is in UTC. IST = UTC + 5:30. (Mon–Fri only)
    - cron: "30 4 * * 1-5"    # 10:00 AM IST
    - cron: "30 6 * * 1-5"    # 12:00 PM IST
    - cron: "0 10 * * 1-5"    # 03:30 PM IST
  workflow_dispatch:
    inputs:
      force_send_summary:
        description: "Send a status summary even if no alert level is crossed"
        required: false
        default: "true"

# Needed so the workflow can commit the updated state file back to the repo.
permissions:
  contents: write

# Avoid overlapping runs racing on the state file.
concurrency:
  group: nifty-alert
  cancel-in-progress: false

jobs:
  nifty-alert:
    name: Run Nifty Alert Bot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Nifty Alert Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
          FORCE_SEND_SUMMARY: ${{ github.event.inputs.force_send_summary || 'false' }}
        run: python nifty_alert.py

      - name: Persist alert state
        if: always()
        run: |
          git config user.name  "nifty-alert-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nifty_state.json
          git diff --staged --quiet || git commit -m "chore: update nifty alert state [skip ci]"
          git push

      - name: Save run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nifty-alert-log-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
          if-no-files-found: ignore
